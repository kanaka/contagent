version: 1

features:
  - names: [base, all, all-tools]
    path: Dockerfile-parts/base
    required: true

  - names: [build, build-tools, all, all-tools]
    path: Dockerfile-parts/build
    version:
      env: BUILD_ESSENTIAL_VERSION
      default: latest
      resolve: page=$(curl -fsSL "https://packages.debian.org/bookworm/build-essential"); printf '%s\n' "$page" | grep -oE 'Package:[[:space:]]build-essential \([^)]+' | sed -E 's/.*\((.*)$/\1/'

  - names: [docker, all, all-tools]
    path: Dockerfile-parts/docker
    version:
      env: DOCKER_VERSION
      default: latest
      resolve: arch=$(uname -m); case "$arch" in x86_64) arch=amd64 ;; aarch64|arm64) arch=arm64 ;; *) arch=amd64 ;; esac; packages=$(curl -fsSL "https://download.docker.com/linux/debian/dists/bookworm/stable/binary-${arch}/Packages"); printf '%s\n' "$packages" | awk '/^Package:[[:space:]]docker-ce-cli$/{f=1;next} f&&/^Version:[[:space:]]/{print $2; exit}'

  - names: [gh, github, github-cli, githubcli, all, all-tools]
    path: Dockerfile-parts/gh
    version:
      env: GH_VERSION
      default: latest
      resolve: curl -fsSL "https://api.github.com/repos/cli/cli/releases/latest" | jq -r '.tag_name | ltrimstr("v")'

  - names: [psql, postgres, postgresql, all, all-tools]
    path: Dockerfile-parts/psql
    version:
      env: PSQL_VERSION
      default: latest
      resolve: curl -fsSL "https://packages.debian.org/bookworm/postgresql-client" | grep -oE 'Package:[[:space:]]postgresql-client \([^)]+' | sed -E 's/.*\((.*)$/\1/' | head -n1

  - names: [go, golang, all, all-tools]
    path: Dockerfile-parts/go
    version:
      env: GO_VERSION
      default: "1.26.0"

  - names: [rust, all, all-tools]
    path: Dockerfile-parts/rust
    version:
      env: RUST_VERSION
      default: "1.89.0"

  - names: [claude, claude-code, cc, claudecode, all, all-agents]
    path: Dockerfile-parts/claude-code
    version:
      env: CLAUDE_CODE_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@anthropic-ai/claude-code/latest" | jq -r .version

  - names: [opencode, all, all-agents]
    path: Dockerfile-parts/opencode
    version:
      env: OPENCODE_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/opencode-ai/latest" | jq -r .version

  - names: [pi, pi-agent, all, all-agents]
    path: Dockerfile-parts/pi
    version:
      env: PI_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@mariozechner/pi-coding-agent/latest" | jq -r .version

  - names: [codex, all, all-agents]
    path: Dockerfile-parts/codex
    version:
      env: CODEX_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@openai/codex/latest" | jq -r .version

  - names: [copilot, github-copilot, githubcopilot, all, all-agents]
    path: Dockerfile-parts/copilot
    version:
      env: COPILOT_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@github/copilot/latest" | jq -r .version
