version: 2

features:
  - name: base
    path: Dockerfile-parts/base
    required: true

  - name: build
    aliases: [build-tools, all, all-tools]
    path: Dockerfile-parts/build
    version:
      env: BUILD_ESSENTIAL_VERSION
      default: latest
      resolve: curl -fsSL "https://deb.debian.org/debian/dists/bookworm/main/binary-amd64/Packages.gz" | gzip -dc | awk '/^Package:[[:space:]]build-essential$/{f=1} f&&/^Version:[[:space:]]/{v=$2;f=0} END{print v}'

  - name: docker
    aliases: [all, all-tools]
    path: Dockerfile-parts/docker
    volumes:
      - arg_name: docker-socket
        default: false
        file: true
        target: /var/run/docker.sock
        sources:
          - ~/.docker/run/docker.sock
          - ~/.colima/default/docker.sock
          - /var/run/docker.sock
    version:
      env: DOCKER_VERSION
      default: latest
      resolve: arch=$(uname -m); case "$arch" in x86_64) arch=amd64 ;; aarch64|arm64) arch=arm64 ;; *) arch=amd64 ;; esac; curl -fsSL "https://download.docker.com/linux/debian/dists/bookworm/stable/binary-${arch}/Packages" | awk '/^Package:[[:space:]]docker-ce-cli$/{p=1;next} p&&/^Version:[[:space:]]/{v=$2} p&&/^$/{p=0} END{print v}'

  - name: java
    aliases: [jdk, clojure, clj, clojurescript, cljs, all, all-tools]
    path: Dockerfile-parts/java
    version:
      env: JAVA_VERSION
      default: latest
      resolve: curl -fsSL "https://api.adoptium.net/v3/info/available_releases" | jq -r '.most_recent_lts'

  - name: go
    aliases: [golang, all, all-tools]
    path: Dockerfile-parts/go
    version:
      env: GO_VERSION
      default: latest
      resolve: curl -fsSL "https://go.dev/VERSION?m=text" | tr -d '\r' | sed -n '1{s/^go//;p;}'

  - name: rust
    aliases: [all, all-tools]
    path: Dockerfile-parts/rust
    version:
      env: RUST_VERSION
      default: latest
      resolve: curl -fsSL "https://static.rust-lang.org/dist/channel-rust-stable.toml" | sed -n '/^\[pkg.rust\]$/,/^\[/{/^version = /{s/^version = "//; s/"$//; s/ .*//; p;};}'

  - name: psql
    aliases: [postgres, postgresql, all, all-tools]
    path: Dockerfile-parts/psql
    volumes:
      - arg_name: psql
        source: ~/.supabase
    version:
      env: PSQL_VERSION
      default: latest
      resolve: curl -fsSL "https://deb.debian.org/debian/dists/bookworm/main/binary-amd64/Packages.gz" | gzip -dc | awk '/^Package:[[:space:]]postgresql-client$/{f=1} f&&/^Version:[[:space:]]/{v=$2;f=0} END{print v}'

  - name: clojure
    aliases: [clj, clojurescript, cljs, all, all-tools]
    path: Dockerfile-parts/clojure
    volumes:
      - { arg_name: clojure, source: ~/.clojure }
      - { arg_name: clojure, source: ~/.m2 }
      - { arg_name: clojure, source: ~/.gitlibs }
    version:
      env: CLOJURE_VERSION
      default: latest
      resolve: curl -fsSL "https://api.github.com/repos/clojure/brew-install/releases/latest" | jq -r '.tag_name'

  - name: clojurescript
    aliases: [cljs, all, all-tools]
    path: Dockerfile-parts/clojurescript
    version:
      env: CLOJURESCRIPT_VERSION
      default: latest
      resolve: curl -fsSL "https://repo1.maven.org/maven2/org/clojure/clojurescript/maven-metadata.xml" | awk 'match($0,/<release>[^<]+<\/release>/){v=substr($0,RSTART+9,RLENGTH-19)} END{if(v)print v; else exit 1}'

  - name: gh
    aliases: [github, github-cli, githubcli, all, all-tools]
    path: Dockerfile-parts/gh
    volumes:
      - arg_name: gh-config
        default: false
        source: ~/.config/gh
    version:
      env: GH_VERSION
      default: latest
      resolve: curl -fsSL "https://api.github.com/repos/cli/cli/releases/latest" | jq -r '.tag_name | ltrimstr("v")'

  - name: mise
    aliases: [all, all-tools]
    path: Dockerfile-parts/mise
    volumes:
      - { arg_name: mise, source: ~/.config/mise }
      - { arg_name: mise, source: ~/.local/share/mise }
      - { arg_name: mise, source: ~/.local/state/mise }
    version:
      env: MISE_VERSION
      default: latest
      resolve: curl -fsSL "https://api.github.com/repos/jdx/mise/releases/latest" | jq -r '.tag_name | ltrimstr("v")'

  - name: pnpm
    aliases: [all, all-tools]
    path: Dockerfile-parts/pnpm
    volumes:
      - { arg_name: pnpm, source: ~/.local/share/pnpm }
    version:
      env: PNPM_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/pnpm/latest" | jq -r .version

  - name: claude
    aliases: [claude-code, cc, claudecode, all, all-agents]
    path: Dockerfile-parts/claude-code
    volumes:
      - arg_name: claude
        source: ~/.claude
    version:
      env: CLAUDE_CODE_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@anthropic-ai/claude-code/latest" | jq -r .version

  - name: opencode
    aliases: [all, all-agents]
    path: Dockerfile-parts/opencode
    volumes:
      - { arg_name: opencode, source: ~/.config/opencode }
      - { arg_name: opencode, source: ~/.local/share/opencode }
      - { arg_name: opencode, source: ~/.local/state/opencode }
    version:
      env: OPENCODE_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/opencode-ai/latest" | jq -r .version

  - name: pi
    aliases: [pi-agent, all, all-agents]
    path: Dockerfile-parts/pi
    volumes:
      - arg_name: pi
        source: ~/.pi
    version:
      env: PI_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@mariozechner/pi-coding-agent/latest" | jq -r .version

  - name: codex
    aliases: [all, all-agents]
    path: Dockerfile-parts/codex
    volumes:
      - arg_name: codex
        source: ~/.codex
    version:
      env: CODEX_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@openai/codex/latest" | jq -r .version

  - name: copilot
    aliases: [github-copilot, githubcopilot, all, all-agents]
    path: Dockerfile-parts/copilot
    volumes:
      - arg_name: copilot
        source: ~/.copilot
    version:
      env: COPILOT_VERSION
      default: latest
      resolve: curl -fsSL "https://registry.npmjs.org/@github/copilot/latest" | jq -r .version

  - name: runtime
    path: Dockerfile-parts/runtime
    required: true
    version:
      default: latest
      resolve: ./voom-like-version.sh .
    volumes:
      - { arg_name: contagent-state, source: ~/.local/state/contagent }
      - { arg_name: contagent-state, source: ~/.cache/contagent, target: /var/cache/contagent }
